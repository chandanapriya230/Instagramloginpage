<!DOCTYPE html>
<html>
<head>
  <title>Vertical Split with Borders</title>
  <style>
    .container {
      display: flex;        /* Arrange children in a row */
      height: 100vh;        /* Full viewport height */
    }

    .left, .right {
      flex: 1;              /* Equal width */
      padding: 20px;
    }

    .left {
      background-color: #f2f2f2;
      border-right: 2px solid black; /* Vertical line on the right edge */
    }

    .right {
      background-color: #e0e0e0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left">
      <h2>Left Side</h2>
      <p>This is the left section with a border dividing it.</p>
    </div>
    <div class="right">
      <h2>Right Side</h2>
      <p>This is the right section.</p>
    </div>
  </div>

</body>
</html>
