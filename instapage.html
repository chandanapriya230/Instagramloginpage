<!DOCTYPE html>
<html>
<head>
    <div>
        <title>Instagram</title>
        <link rel="stylesheet" href="instapage_style.css">
    </div>
</head>

<body>
<div class="container">
    <div class="left">
        <h2>See everyday moments from your <a style="color: #b81da4e8;">close friends.</a></h2>
        <img src="256px-Instagram_icon.png" alt="Instagram Icon">

        <div class="picture">
        <img src="instapic.jpg" alt="picc">
        <img src="download (1).jpg" alt="pic">
        <img src="instagram.png" alt="friends">
         <img src="swag.jpg"alt="swag">
        </div>
        
    </div> 
    <div class="divider"></div>
    <div class="right">
        <div class="loginpage">
            <h1 >Login to Instagram</h1>
            <form>
                <input type="text" placeholder="Phone number, username, or email">
                <input type="password" placeholder="password">
                <button type="submit">Login</button>
                <h3>Forgot Password?</h3>
                <input type="text" placeholder=" login with Facebook">
                <input type="text" placeholder="Create New Account">
            </form>
            <h4>Meta</h4>
        </div>
    </div>
</div>
</body>
</html>
